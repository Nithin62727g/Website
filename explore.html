<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LearnFlow AI — Explore Paths</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ── Explore Page Specific Styling (Android Inspired) ── */
    
    .explore-header { margin-bottom: 24px; padding-top: 16px; }
    .explore-title { font-size: 28px; font-weight: 800; color: var(--on-bg); letter-spacing: -0.8px; }

    /* Search Bar */
    .search-container { margin-bottom: 20px; position: relative; }
    .fp-search {
      width: 100%; height: 52px; background: var(--surface); border: 1.5px solid var(--card-border);
      border-radius: 16px; padding: 0 16px 0 48px;
      font-size: 15px; color: var(--on-bg);
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="%235C35D4" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>');
      background-repeat: no-repeat; background-position: 16px center;
      transition: all 0.2s;
    }
    .fp-search:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(92,53,212,0.1); outline: none; }

    /* Pill Tabs */
    .tabs-container {
      background: var(--surface); border: 1.5px solid var(--card-border);
      border-radius: 16px; padding: 4px; display: flex; margin-bottom: 24px;
    }
    .fp-tab {
      flex: 1; padding: 10px; text-align: center; font-size: 13px; font-weight: 700;
      border-radius: 12px; cursor: pointer; color: var(--on-surface-variant); transition: all 0.2s;
    }
    .fp-tab.active { background: var(--bg); color: var(--primary); box-shadow: var(--shadow-xs); }

    /* Roadmap Grid */
    .roadmap-grid {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;
      padding-bottom: 40px;
    }
    
    .rm-grid-card {
      background: var(--surface); border: 1.5px solid var(--card-border);
      border-radius: 14px; height: 60px; padding: 0 16px;
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative; overflow: hidden;
    }
    .rm-grid-card:hover { transform: translateY(-2px); border-color: rgba(92,53,212,0.3); box-shadow: var(--shadow-sm); }
    .rm-grid-card.saved { background: rgba(92,53,212,0.05); border-color: rgba(92,53,212,0.3); }

    .rm-grid-card .title {
      font-size: 13.5px; font-weight: 600; color: var(--on-bg);
      line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
      flex: 1; margin-right: 8px;
    }
    
    .card-actions { display: flex; align-items: center; gap: 8px; }
    
    .new-badge {
      display: flex; align-items: center; gap: 4px; font-size: 9px; font-weight: 800; color: var(--primary);
      text-transform: uppercase;
    }
    .new-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--primary); }
    
    .bookmark-btn {
      width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
      border: none; background: transparent; color: rgba(100, 116, 139, 0.45); cursor: pointer; transition: all 0.2s;
      border-radius: 50%;
    }
    .bookmark-btn.saved { color: var(--primary); }
    .bookmark-btn:hover { background: var(--bg); transform: scale(1.1); }

    /* Create Own Button */
    .create-own-btn {
      grid-column: 1 / -1; display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 16px; border: 1.5px solid rgba(100, 116, 139, 0.2); border-radius: 12px;
      font-size: 14px; font-weight: 600; color: var(--on-surface-variant); cursor: pointer;
      transition: all 0.2s; margin-top: 8px; background: transparent;
    }
    .create-own-btn:hover { background: var(--card); border-color: var(--on-surface-variant); transform: translateY(-1px); }

    @media(max-width: 600px) {
      .roadmap-grid { grid-template-columns: 1fr; }
      .explore-title { font-size: 24px; }
    }
  </style>
</head>
<body>
  
  <div class="app-layout">
    <div id="sidebar-container"></div>

    <main class="main-content">
      <div class="content-area">
        
        <header class="explore-header animate-up">
          <h1 class="explore-title">Explore Paths</h1>
        </header>

        <section class="search-container animate-up" style="transition-delay:0.1s;">
          <input type="text" class="fp-search" id="explore-search" placeholder="Search roadmaps...">
        </section>

        <nav class="tabs-container animate-up" style="transition-delay:0.15s;">
          <div class="fp-tab active" id="tab-role" onclick="switchTab('role')">Role-based</div>
          <div class="fp-tab" id="tab-skill" onclick="switchTab('skill')">Skill-based</div>
        </nav>

        <div>
          <div class="roadmap-grid" id="roadmap-grid">
            <!-- Populated via JS -->
          </div>
        </div>

      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jwt-decode@3.1.2/build/jwt-decode.min.js"></script>
  <script src="js/api.js?v=1770000002"></script>
  <script src="js/app.js?v=1770000002"></script>
  <script src="js/roadmaps-data.js?v=1770000002"></script>
  <script src="js/explore.js?v=1770000002"></script>
  <script>
    // Self-contained roadmap opener — works even if explore.js crashed
    window.__openRM = function(encodedTitle) {
      var title = decodeURIComponent(encodedTitle);
      if (typeof openRoadmap === 'function') { openRoadmap(encodedTitle); return; }
      var id = 'static_' + title.replace(/\s+/g,'_').toLowerCase();
      var data = (typeof ROADMAPS_DATA !== 'undefined' && ROADMAPS_DATA[title]) || null;
      var mods = data ? data.mods : [
        {t:'Getting Started', tps:['Introduction','Core Concepts','Setup','First Project','Community & Resources']},
        {t:'Core Fundamentals', tps:['Variables & Types','Control Flow','Functions','Data Structures','Error Handling']},
        {t:'Intermediate Concepts', tps:['OOP Design','Functional Concepts','Concurrency','Memory Management','Design Patterns']},
        {t:'Ecosystem & Tooling', tps:['Package Managers','Build Tools','Testing','Debugging','Deployment']},
        {t:'Advanced Topics', tps:['Scalability','Security','Integration Patterns','Architecture','Performance']},
        {t:'Real-World Projects', tps:['Build a REST API','Database Integration','Auth System','Deploy to Cloud','Monitoring']}
      ];
      var rm = {id:id,goal_title:title,description:(data?data.desc:'A comprehensive learning path for '+title+'.'),difficulty:(data?data.diff:'Beginner'),hours_per_week:(data?data.hrs:10),is_static:true,
        modules:mods.map(function(m,mi){return{id:'m'+mi,title:m.t,order:mi,topics:m.tps.map(function(tp,ti){var isObj=typeof tp==='object';var tpTitle=isObj?tp.t:tp;return{id:id+'_'+tpTitle.replace(/ /g,'_').toLowerCase(),title:tpTitle,description:'Learn '+tpTitle+' as part of '+m.t+'.',key_concepts:'',duration:'',resources:[],order:ti,is_done:false};})};})};  
      try{var cache=getRoadmapsCache();cache=cache.filter(function(c){return c.id!==id;});cache.unshift({id:id,goal_title:title,data:rm});saveRoadmapsCache(cache);}catch(e){}
      window.location.href='roadmap.html?id='+id;
    };
    // Initialize sidebar
    document.getElementById('sidebar-container').outerHTML = renderSidebar(1);

    // GUARANTEED FALLBACK: If explore.js renderGrid() failed silently, render inline
    setTimeout(function() {
      var grid = document.getElementById('roadmap-grid');
      if (!grid || grid.children.length === 0) {
        var ROLE = ["Frontend","Backend","Web Dev","DevOps","DevSecOps","Data Analyst","AI/ML","AI and Data Scientist","Data Engineer","Android Dev","Machine Learning","PostgreSQL","iOS","Blockchain","QA","Software Architect","Cyber Security","UX Design","Technical Writer","Game Developer","Server Side Game Developer","MLOps","Product Manager","Engineering Manager","Developer Relations","BI Analyst"];
        var SKILL = ["SQL","Computer Science","React","Vue","Angular","JavaScript","TypeScript","Node.js","Python","System Design","Java","ASP.NET Core","API Design","Spring Boot","Flutter","C++","Rust","Go Roadmap","Design and Architecture","GraphQL","React Native","Design System","Prompt Engineering","MongoDB","Linux","Kubernetes","Docker","AWS","Terraform","Data Structures & Algorithms","Redis","Git and GitHub","PHP","Cloudflare","AI Red Teaming","AI Agents","Next.js","Code Review","Kotlin","HTML","CSS","Swift & Swift UI","Shell / Bash","Laravel","Elasticsearch","WordPress","Django","Ruby","Ruby on Rails","Claude Code","Vibe Coding"];
        var currentList = ROLE;
        function renderInline() {
          var tab = document.querySelector('.fp-tab.active');
          currentList = (tab && tab.id === 'tab-skill') ? SKILL : ROLE;
          var q = document.getElementById('explore-search') ? document.getElementById('explore-search').value.toLowerCase() : '';
          var filtered = q ? currentList.filter(function(t){ return t.toLowerCase().indexOf(q) >= 0; }) : currentList;
          grid.innerHTML = filtered.map(function(t) {
            return '<div class="rm-grid-card" onclick="window.__openRM(\''+encodeURIComponent(t)+'\')" style="cursor:pointer">' +
                   '<span class="title">'+t+'</span>' +
                   '<div class="card-actions">' +
                   '<button class="bookmark-btn" onclick="event.stopPropagation(); if (window.saveRoadmap) window.saveRoadmap(event, \''+encodeURIComponent(t)+'\', this); else window.location=\'login.html\';" title="Save to My Learning">' +
                   '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(100, 116, 139, 0.45)" stroke-width="2.5"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>' +
                   '</button></div></div>';
          }).join('') + '<div style="grid-column:1/-1;margin-top:8px;"><button class="create-own-btn" onclick="window.location=\'companion.html\'">+ Create your own Roadmap with AI</button></div>';
        }
        renderInline();
        // wire up tabs and search
        document.getElementById('tab-role') && document.getElementById('tab-role').addEventListener('click', function(){ document.getElementById('tab-role').classList.add('active'); document.getElementById('tab-skill').classList.remove('active'); renderInline(); });
        document.getElementById('tab-skill') && document.getElementById('tab-skill').addEventListener('click', function(){ document.getElementById('tab-skill').classList.add('active'); document.getElementById('tab-role').classList.remove('active'); renderInline(); });
        document.getElementById('explore-search') && document.getElementById('explore-search').addEventListener('input', renderInline);
      }
    }, 300);
  </script>
</body>
</html>
